name: C/C++ CI

on:
  push:
  release:
    types: [ published ]

jobs:
  build-and-test:
    name: build (${{ matrix.name }})
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-24.04
            cc: gcc
            cflags: "-std=gnu99"
          - name: linux-clang
            os: ubuntu-24.04
            cc: clang
            cflags: "-std=gnu99"
          - name: linux-clang-c89
            os: ubuntu-24.04
            cc: clang
            cflags: "-std=c89 -Wno-endif-labels -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE -D_BSD_SOURCE -Wno-comment"
          - name: windows
            os: windows-2025
          - name: macos
            os: macos-15
    env:
      CC: ${{ matrix.cc }}

    steps:
    - uses: actions/checkout@v6

    - name: configure cmake
      run: mkdir build-dir && cd build-dir && cmake -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/artifacts ${{ matrix.cflags && format('-DCMAKE_C_FLAGS="{0}"', matrix.cflags) }} ..

    - name: build
      run: cmake --build build-dir --parallel 4

    - name: install
      run: cmake --build build-dir --target install

    - if: matrix.os == 'windows-2025'
      name: Test run
      run: |
        netsh advfirewall firewall add rule name="unabto_unittest" dir=in action=allow program="${{ github.workspace }}\artifacts\bin\unabto_unittest.exe" enable=yes
        ${{ github.workspace }}/artifacts/bin/unabto_unittest
    - if: matrix.os != 'windows-2025'
      name: Test run
      run: ${{ github.workspace }}/artifacts/bin/unabto_unittest

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v7
      with:
        name: artifacts_${{matrix.name}}
        path: ${{ github.workspace }}/artifacts
        if-no-files-found: warn

  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format
    - name: Check formatting
      run: find src apps test -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install clang-tidy
      run: sudo apt-get update && sudo apt-get install -y clang-tidy clang
    - name: Run clang-tidy
      run: ./tools/run-clang-tidy.sh

  release-assets:
    name: Release Assets
    needs: build-and-test
    runs-on: ubuntu-24.04
    permissions:
      # allow assets to be uploaded to a release
      contents: write
    strategy:
      matrix:
        binary: [unabto_tunnel]
    if: github.event_name == 'release' && success()
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: artifacts_linux-gcc
          path: linux
      - uses: actions/download-artifact@v8
        with:
          name: artifacts_windows
          path: windows
      - uses: actions/download-artifact@v8
        with:
          name: artifacts_macos
          path: macos
      - name: List assets
        run: ls -R
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/bin/${{ matrix.binary }}
            windows/bin/${{ matrix.binary }}.exe
            macos/bin/${{ matrix.binary }}
